<!DOCTYPE html>
<html>
<head>
<!--
  Avery L7161 spec (per Avery 6490 glabels reference): margin 8.1mm 7.4mm, column-gap 2.4mm, row-gap 0.
  Values below (page margin, column-gap, row-gap, and .label padding) include a calibration offset
  measured 2026-07-03 for this HP LaserJet M211dw's registration/feed inaccuracy plus a deliberate
  QR/text left-shift within each label. Re-measure (see Deferred.md's REQ-002 calibration cycle) if
  printing from a different printer.
-->
<style>
@page { size: 210mm 297mm; margin: 3.1mm 5.35mm 4.3mm 5.35mm; }
body { margin: 0; padding: 0; }
.sheet {
  display: grid;
  grid-template-columns: repeat(3, 63.5mm);
  grid-template-rows: repeat(6, 46.6mm);
  column-gap: 4.4mm;
  row-gap: 2mm;
}
.label {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2mm 18mm 2mm 2mm;
  box-sizing: border-box;
  overflow: hidden;
}
.label img { width: 34mm; height: 34mm; }
.info {
  font-size: 9pt;
  text-align: center;
  margin-top: 1mm;
  line-height: 1.3;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  width: 100%;
}
.small-type { font-size: 8pt; }
</style>
</head>
<body>
<div class="sheet">
  {% for _ in range(start - 1) %}<div class="label"></div>{% endfor %}
  {% for card in cards %}
  <div class="label">
    <img src="data:image/png;base64,{{ card.qr }}">
    <div class="info"><span class="{{ 'small-type' if (card.owner ~ ' · ' ~ card.set)|length >= 30 else '' }}">{{ card.owner }} · {{ card.set }}</span><br>
    <span class="{{ 'small-type' if card.type|length > 30 else '' }}">{{ card.type }}</span></div>
  </div>
  {% endfor %}
</div>
</body>
</html>
