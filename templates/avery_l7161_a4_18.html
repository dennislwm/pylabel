<!DOCTYPE html>
<html>
<head>
<style>
@page { size: 210mm 297mm; margin: 8.1mm 7.4mm; }
body { margin: 0; padding: 0; }
.sheet {
  display: grid;
  grid-template-columns: repeat(3, 63.5mm);
  grid-template-rows: repeat(6, 46.6mm);
  column-gap: 2.4mm;
  row-gap: 0;
}
.label {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2mm;
  box-sizing: border-box;
  overflow: hidden;
}
.label img { width: 34mm; height: 34mm; }
.info {
  font-size: 7pt;
  text-align: center;
  margin-top: 1mm;
  line-height: 1.3;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  width: 100%;
}
</style>
</head>
<body>
<div class="sheet">
  {% for card in cards %}
  <div class="label">
    <img src="data:image/png;base64,{{ card.qr }}">
    <div class="info">{{ card.owner }} · {{ card.set }}<br>{{ card.type }}</div>
  </div>
  {% endfor %}
</div>
</body>
</html>
