<!DOCTYPE html>
<html>
<head>
<!--
  Avery L7161 spec (per Avery 6490 glabels reference): margin 8.1mm 7.4mm, column-gap 2.4mm, row-gap 0.
  Values below (page margin, column-gap, row-gap, and .label padding) were measured 2026-07-03 for
  this HP LaserJet M211dw. They are NOT the spec plus a uniform offset: column-gap (4.4mm vs spec
  2.4mm) and row-gap (2mm vs spec 0) change the grid PITCH, so labels 2-3 across and 2-6 down land
  progressively further from where the spec would put them. The .label padding is additionally a
  deliberate QR/text left-shift within each label.
  Re-measuring on a different printer therefore means re-deriving the gaps too, not just the @page
  margin (see the "L7161 printer calibration" row in the wiki's Conventions.md).
-->
<style>
@page { size: 210mm 297mm; margin: 3.1mm 5.35mm 4.3mm 5.35mm; }
body { margin: 0; padding: 0; }
.sheet {
  display: grid;
  grid-template-columns: repeat(3, 63.5mm);
  grid-template-rows: repeat(6, 46.6mm);
  column-gap: 4.4mm;
  row-gap: 2mm;
}
.label {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2mm 18mm 2mm 2mm;
  box-sizing: border-box;
  overflow: hidden;
}
.label img { width: 34mm; height: 34mm; }
.info {
  font-size: 9pt;
  text-align: center;
  margin-top: 1mm;
  line-height: 1.3;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  width: 100%;
}
.small-type { font-size: 8pt; }
</style>
</head>
<body>
<div class="sheet">
  {% for _ in range(start - 1) %}<div class="label"></div>{% endfor %}
  {% for card in cards %}
  <div class="label">
    <img src="data:image/png;base64,{{ card.qr }}">
    <div class="info"><span class="{{ 'small-type' if (card.owner ~ ' · ' ~ card.set)|length >= 30 else '' }}">{{ card.owner }} · {{ card.set }}</span><br>
    <span class="{{ 'small-type' if card.type|length > 30 else '' }}">{{ card.type }}</span></div>
  </div>
  {% endfor %}
</div>
</body>
</html>
